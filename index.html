<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidereal Chronograph</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                dark: 'rgb(var(--color-brand-dark) / <alpha-value>)',
                purple: 'rgb(var(--color-brand-purple) / <alpha-value>)',
                orange: 'rgb(var(--color-brand-orange) / <alpha-value>)',
                surface: 'rgb(var(--color-brand-surface) / <alpha-value>)',
                'surface-highlight': 'rgb(var(--color-brand-surface-highlight) / <alpha-value>)',
                text: 'rgb(var(--color-brand-text) / <alpha-value>)',
                'text-muted': 'rgb(var(--color-brand-text-muted) / <alpha-value>)',
                border: 'rgb(var(--color-brand-border-rgb) / <alpha-value>)',
              }
            },
            borderColor: {
              DEFAULT: 'rgb(var(--color-brand-border-rgb) / 0.1)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Source Code Pro', 'monospace'],
              display: ['Orbitron', 'sans-serif'],
            },
            borderRadius: {
              '3xl': '1.5rem',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin+Condensed:wght@400;700&family=Orbitron:wght@400;700&family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-orbitron {
        font-family: 'Orbitron', sans-serif;
        font-variant-numeric: tabular-nums;
      }
      .font-inter {
        font-family: 'Inter', sans-serif;
      }
      .font-source-code-pro {
        font-family: 'Source Code Pro', monospace;
      }
      .font-cabin-condensed {
        font-family: 'Cabin Condensed', sans-serif;
      }
       /* Gradient Styles */
      .gradient-text-violet { /* Conjunction: Purple/Magenta */
        background: linear-gradient(90deg, #8A2BE2, #FF00FF);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }
       .gradient-text-teal { /* Trine: Emerald/Cyan-Green */
        background: linear-gradient(90deg, #009B77, #00FFBF);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }
      .gradient-text-orange { /* Square: Yellow/Orange */
        background: linear-gradient(90deg, #FFD700, #FFA500);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }
      .gradient-text-opposition { /* Opposition: Red/Purple */
        background: linear-gradient(90deg, #DC143C, #8A2BE2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }
      .gradient-text-sextile { /* Sextile: Cyan/Royal Blue */
        background: linear-gradient(90deg, #00FFFF, #4169E1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }
      .gradient-bg-violet {
        background-image: linear-gradient(90deg, #FF2CDF, #0014FF);
      }
      .gradient-bg-teal {
        background-image: linear-gradient(90deg, #00FF5B, #0014FF);
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
